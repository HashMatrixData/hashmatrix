# platform-common 子 chart values —— M1 真实部署（平台公共服务：调度/工作流/统一元数据/审计）。
# 🔴 红线：仅 dev 占位凭据 / 脱敏 demo（acme / tenant-demo / example.com）；严禁任何真实甲方参数。
# D5：子仓交付 image，主仓 owns chart；镜像部署级注入、tag 固定（勿 latest）。
# umbrella 经 `platform-common.enabled` 渲染（默认关，仅 values-localdev 开）。

# umbrella 注入的全局项（standalone 渲染时为空 dict）；imageRegistry 供信创 xc 切私有/国产化镜像仓。
global:
  imageRegistry: ""

# umbrella 条件开关（对应 platform/Chart.yaml dependencies 的 condition: platform-common.enabled）。
enabled: false

image:
  repository: ghcr.io/hashmatrixdata/platform-common
  tag: "0.1.0"                # dev 固定 tag；本地经 kind load 入节点（配 IfNotPresent）
  pullPolicy: IfNotPresent

replicas: 1
# 资源限额（dev 保守默认；prod 经 values-<env> 上调）。memory limit 是 OOM 护栏（多 JVM 叠加，#32）。
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
# JVM 堆随**容器 limit**自适配（MaxRAMPercentage 作用于 cgroup limit）。注入为 JAVA_TOOL_OPTIONS。
jvmOpts: "-XX:MaxRAMPercentage=75.0"

service:
  type: ClusterIP
  port: 8089                  # 应用 HTTP（端口基线）；gateway upstream host=platform-common:8089 依赖此名/口
managementPort: 9089          # actuator（探针/指标），独立于应用端口（端口基线 §3）

# ── 数据源：指向 infra-dev 的 in-cluster PG（独立 db `platformcommon`，纯 JDBC/HikariCP，无 JPA）──
# 🔴 dev 占位凭据；生产经 ESO/secretRef 注入 PLATFORM_DB_PASSWORD。
# 注意 user=hashmatrix：infra-dev PG 的单超级用户（≠ 应用默认 platform）。
# 应用侧 env 为完整 JDBC URL（PLATFORM_DB_URL）→ 模板按 host/port/db 拼接。
datasource:
  host: postgres
  port: 5432
  db: platformcommon          # 对齐 infra-dev initdb 库名（无分隔小写）
  user: hashmatrix
  password: hashmatrix
