apiVersion: v1
kind: Service
metadata:
  # 固定名 `platform-common`（非 release 前缀）：gateway upstream host=platform-common:8089 依赖此名
  # （单 ns 内 well-known fixture，同 governance/security/infra-dev keycloak/postgres）。
  name: platform-common
  labels:
    {{- include "platform-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-common
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/component: platform-common
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
    - name: management
      port: {{ .Values.managementPort }}
      targetPort: management
