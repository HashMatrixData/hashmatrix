apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-common
  labels:
    {{- include "platform-common.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-common
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: platform-common
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "platform-common.labels" . | nindent 8 }}
        app.kubernetes.io/component: platform-common
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # 镜像 Dockerfile 已 USER 10001（非 root 数字 uid，见子仓 Dockerfile）；此处显式声明 + seccomp，
      # 不带 runAsUser（由镜像 USER 决定）即满足 restricted PSA 的 runAsNonRoot 校验。
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: platform-common
          image: {{ include "platform-common.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.managementPort | quote }}
            {{- with .Values.jvmOpts }}
            # JVM 堆受容器 memory limit 约束（非节点总内存）；防多 JVM 叠加 OOM（#32）。
            - name: JAVA_TOOL_OPTIONS
              value: {{ . | quote }}
            {{- end }}
            # ── 数据源（infra-dev in-cluster PG，独立 db `platformcommon`，纯 JDBC/HikariCP）──
            # 应用 env 为完整 JDBC URL → 由 host/port/db 拼接。HikariCP initializationFailTimeout=-1
            # （应用侧）：PG 缺失不阻塞启动，健康探针反映真实状态。
            - name: PLATFORM_DB_URL
              value: {{ printf "jdbc:postgresql://%s:%v/%s" .Values.datasource.host .Values.datasource.port .Values.datasource.db | quote }}
            - name: PLATFORM_DB_USER
              value: {{ .Values.datasource.user | quote }}
            # 🔴 dev 占位明文；生产改 secretKeyRef/ESO 注入。
            - name: PLATFORM_DB_PASSWORD
              value: {{ .Values.datasource.password | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
            - name: management
              containerPort: {{ .Values.managementPort }}
          readinessProbe:
            # deps-optional readiness：仅看应用 readinessState（PG 缺失不拖垮）。探管理端口。
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
