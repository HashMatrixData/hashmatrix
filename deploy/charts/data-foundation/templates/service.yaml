apiVersion: v1
kind: Service
metadata:
  # 固定名 `data-foundation`（非 release 前缀）：gateway upstream host=data-foundation:8084 依赖此名
  # （单 ns 内 well-known fixture，同 governance/security/infra-dev keycloak/postgres）。
  name: data-foundation
  labels:
    {{- include "data-foundation.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-foundation
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/component: data-foundation
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
    - name: management
      port: {{ .Values.managementPort }}
      targetPort: management
