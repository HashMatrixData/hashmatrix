{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  # 固定名 `postgres`（非 release 前缀）：各服务 datasource 以 `postgres:5432` 稳定引用
  # （单 ns 内唯一 dev 库，well-known fixture，by design——同 keycloak/upstream-echo）。
  name: postgres
  labels:
    {{- include "infra-dev.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
{{- end }}
