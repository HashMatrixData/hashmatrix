apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: control-plane
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "control-plane.labels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # 镜像 Dockerfile 已 USER 10001（非 root 数字 uid，见子仓 Dockerfile）；此处显式声明 + seccomp，
      # 不带 runAsUser（由镜像 USER 决定）即满足 restricted PSA 的 runAsNonRoot 校验。
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control-plane
          image: {{ include "control-plane.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.managementPort | quote }}
            {{- with .Values.jvmOpts }}
            # JVM 堆受容器 memory limit 约束（非节点总内存）；防多 JVM 叠加 OOM（#32）。
            - name: JAVA_TOOL_OPTIONS
              value: {{ . | quote }}
            {{- end }}
            # ── 数据源（infra-dev in-cluster PG，独立 db `controlplane`，Flyway 管 schema）──
            # 应用 env 为完整 JDBC URL → 由 host/port/db 拼接。
            - name: CONTROL_PLANE_DB_URL
              value: {{ printf "jdbc:postgresql://%s:%v/%s" .Values.datasource.host .Values.datasource.port .Values.datasource.db | quote }}
            - name: CONTROL_PLANE_DB_USER
              value: {{ .Values.datasource.user | quote }}
            # 🔴 dev 占位明文；生产改 secretKeyRef/ESO 注入。
            - name: CONTROL_PLANE_DB_PASSWORD
              value: {{ .Values.datasource.password | quote }}
            {{- if .Values.keycloak.enabled }}
            # ── 真实 Keycloak Admin IdentityProvisioner（D6）：切 identity=keycloak（其余 provisioner 仍 stub）──
            # 经 Spring relaxed-binding 直接绑定 hashmatrix.control-plane.provisioning.{identity,keycloak.*}
            # （application.yml 中 keycloak 块默认注释，故此处用规范化 env 名直绑，不依赖该占位块）。
            # 🔴 dev 占位明文；生产经 ESO/secretRef 注入 password。集群内经 Service keycloak:8080 访问。
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_IDENTITY
              value: keycloak
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_KEYCLOAK_SERVERURL
              value: {{ .Values.keycloak.serverUrl | quote }}
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_KEYCLOAK_AUTHREALM
              value: {{ .Values.keycloak.authRealm | quote }}
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_KEYCLOAK_TARGETREALM
              value: {{ .Values.keycloak.targetRealm | quote }}
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_KEYCLOAK_CLIENTID
              value: {{ .Values.keycloak.clientId | quote }}
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_KEYCLOAK_USERNAME
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_KEYCLOAK_PASSWORD
              value: {{ .Values.keycloak.adminPassword | quote }}
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_KEYCLOAK_TENANTADMINROLE
              value: {{ .Values.keycloak.tenantAdminRole | quote }}
            - name: HASHMATRIX_CONTROLPLANE_PROVISIONING_KEYCLOAK_DOMAINSUFFIX
              value: {{ .Values.keycloak.domainSuffix | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
            - name: management
              containerPort: {{ .Values.managementPort }}
          readinessProbe:
            # deps-optional readiness：仅看应用 readinessState（PG 缺失不拖垮）。探管理端口。
            # failureThreshold 给足启动窗（Flyway 启动期迁移）。
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
