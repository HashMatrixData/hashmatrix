apiVersion: v2
name: control-plane
description: |
  多租户控制平面子 chart（M1 真实部署）。由 umbrella chart `platform` 按 `control-plane.enabled` 聚合。
  D5：子仓 services/control-plane 交付 image，主仓 owns chart。M1 提供 Deployment + Service（应用 8081 /
  管理 9081），datasource 指向 infra-dev 的 in-cluster PG（独立 db `controlplane`，Flyway 管 schema）；
  身份开通默认 stub，经 `keycloak.enabled` 可切真实 Keycloak Admin IdentityProvisioner（D6）；完整开通编排属 post-M1。
type: application

version: 0.1.0
appVersion: "0.1.0"

keywords:
  - hashmatrix
  - control-plane
  - Java

home: https://github.com/HashMatrixData/hashmatrix-control-plane
sources:
  - https://github.com/HashMatrixData/hashmatrix-control-plane
